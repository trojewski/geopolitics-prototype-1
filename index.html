<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Stock Scene</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        font-family: Arial, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hint {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(11, 16, 32, 0.7);
        color: #dbeafe;
        font-size: 12px;
        line-height: 1.35;
        user-select: none;
      }

      .tooltip {
        position: fixed;
        z-index: 20;
        display: none;
        padding: 6px 8px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 6px;
        background: rgba(15, 23, 42, 0.88);
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hint">
      Left drag: rotate<br />
      Right drag: pan<br />
      Scroll: zoom
    </div>
    <div id="tooltip" class="tooltip"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const app = document.getElementById("app");
      const tooltip = document.getElementById("tooltip");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1020);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(6, 5, 6);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      app.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = true;
      controls.enableZoom = true;
      controls.target.set(0, 0, 0);
      controls.update();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
      keyLight.position.set(8, 12, 6);
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0x99bbff, 0.35);
      fillLight.position.set(-7, 4, -5);
      scene.add(fillLight);

      const grid = new THREE.GridHelper(20, 20, 0x334155, 0x1e293b);
      scene.add(grid);

      const inactiveViewControllerColor = 0x1e293b;
      const inactiveViewControllerMetalness = 0.15;
      const inactiveViewControllerRoughness = 0.5;

      // "Stage": large thin hexagonal disc below Earth.
      const stageHeight = 0.08;
      const stage = new THREE.Mesh(
        new THREE.CylinderGeometry(2.3, 2.3, stageHeight, 6),
        new THREE.MeshStandardMaterial({
          color: inactiveViewControllerColor,
          metalness: inactiveViewControllerMetalness,
          roughness: inactiveViewControllerRoughness
        })
      );
      stage.position.set(0, stageHeight / 2, 0);
      stage.name = "Stage";
      scene.add(stage);

      const stageBorderRadius = 2.31;
      const stageBorderY = stage.position.y + stageHeight / 2 + 0.002;
      const stageBorderAngleOffset = Math.PI / 2;
      const stageBorderPoints = [];
      for (let i = 0; i < 6; i += 1) {
        const angle = (i / 6) * Math.PI * 2 + stageBorderAngleOffset;
        stageBorderPoints.push(
          new THREE.Vector3(
            Math.cos(angle) * stageBorderRadius,
            stageBorderY,
            Math.sin(angle) * stageBorderRadius
          )
        );
      }
      const stageBorder = new THREE.LineLoop(
        new THREE.BufferGeometry().setFromPoints(stageBorderPoints),
        new THREE.LineBasicMaterial({ color: 0x334155 })
      );
      stageBorder.name = "StageBorder";
      scene.add(stageBorder);
      const stageBorderBaseColor = new THREE.Color(0x334155);
      const stageBorderSnapColor = new THREE.Color(0xef4444);

      const earthRadius = 1;
      const textureLoader = new THREE.TextureLoader();
      const earthColorMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
      );
      earthColorMap.colorSpace = THREE.SRGBColorSpace;
      earthColorMap.anisotropy = renderer.capabilities.getMaxAnisotropy();

      const earthNormalMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_normal_2048.jpg"
      );
      earthNormalMap.anisotropy = renderer.capabilities.getMaxAnisotropy();

      const earthSpecularMap = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_specular_2048.jpg"
      );
      earthSpecularMap.anisotropy = renderer.capabilities.getMaxAnisotropy();

      const earth = new THREE.Mesh(
        new THREE.SphereGeometry(earthRadius, 64, 48),
        new THREE.MeshPhongMaterial({
          map: earthColorMap,
          normalMap: earthNormalMap,
          specularMap: earthSpecularMap,
          specular: new THREE.Color(0x2c3e50),
          shininess: 18
        })
      );
      // Earth rests on top of Stage.
      earth.position.set(0, stage.position.y + stageHeight / 2 + earthRadius, 0);
      earth.name = "Earth";
      scene.add(earth);

      // "Stock": thin hexagonal discs positioned above Earth.
      const stockGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.03, 6);
      const stockEdgeGeometry = new THREE.EdgesGeometry(stockGeometry);
      const stockMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.8,
        transmission: 0.35,
        metalness: 0.0,
        roughness: 0.05,
        ior: 1.45,
        thickness: 0.22
      });
      const stockEdgeMaterial = new THREE.LineBasicMaterial({ color: 0x111111 });

      // "Flow": thin connectors for Earth->stock and stock->stock.
      const flowRadius = 0.03;
      const stockFlowRadius = flowRadius * 0.5;
      const flowMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.55,
        transmission: 0.7,
        metalness: 0.0,
        roughness: 0.05,
        ior: 1.45,
        thickness: 0.2
      });
      const upAxis = new THREE.Vector3(0, 1, 0);
      const stockRegistry = new Map();
      const stockConnectedFlows = [];
      const animatedStockFlows = [];
      const flowTempDirection = new THREE.Vector3();
      const flowTempMidpoint = new THREE.Vector3();
      const stockRootNames = [
        "GovernmentWealth",
        "ElitePopulationWealth",
        "GeneralPopulationWealth",
        "GeneralPopulationDebt",
        "ElitePopulationInfluence",
        "GovernmentDebt"
      ];
      const stockParentMap = {
        GovernmentHealth: "GovernmentWealth",
        ElitePopulationAmount: "ElitePopulationWealth",
        GeneralPopulationAmount: "GeneralPopulationWealth",
        GeneralPopulationImmiseration: "GeneralPopulationDebt"
      };

      const createStockAt = (position, name) => {
        const stockMesh = new THREE.Mesh(stockGeometry, stockMaterial.clone());
        stockMesh.position.copy(position);
        stockMesh.name = name;
        scene.add(stockMesh);

        const edges = new THREE.LineSegments(stockEdgeGeometry, stockEdgeMaterial.clone());
        edges.position.copy(position);
        edges.name = `${name}_Edges`;
        scene.add(edges);
        stockRegistry.set(name, {
          mesh: stockMesh,
          edges,
          baseMeshColor: stockMesh.material.color.clone(),
          baseEdgeColor: edges.material.color.clone(),
          targetPosition: position.clone(),
          targetRotationZ: 0,
          isRotated: false
        });

        return stockMesh;
      };

      const updateFlowTransform = (flowMesh, startPos, endPos) => {
        flowTempDirection.subVectors(endPos, startPos);
        const length = flowTempDirection.length();
        if (length < 0.001) {
          return false;
        }

        flowTempMidpoint.copy(startPos).add(endPos).multiplyScalar(0.5);
        flowMesh.position.copy(flowTempMidpoint);
        flowMesh.quaternion.setFromUnitVectors(upAxis, flowTempDirection.normalize());
        flowMesh.scale.set(1, length, 1);
        return true;
      };

      const createFlowBetween = (
        start,
        end,
        name,
        radius = flowRadius,
        connectedStockNames = [],
        dynamic = false
      ) => {
        const flowMesh = new THREE.Mesh(
          new THREE.CylinderGeometry(radius, radius, 1, 16),
          flowMaterial.clone()
        );
        const startPos = start instanceof THREE.Object3D ? start.position : start;
        const endPos = end instanceof THREE.Object3D ? end.position : end;
        if (!updateFlowTransform(flowMesh, startPos, endPos)) {
          return null;
        }
        flowMesh.name = name;
        flowMesh.userData.connectedStockNames = connectedStockNames;
        flowMesh.userData.layoutVisible = true;
        scene.add(flowMesh);
        if (connectedStockNames.length > 0) {
          stockConnectedFlows.push(flowMesh);
        }
        if (dynamic) {
          animatedStockFlows.push({ flowMesh, start, end });
        }
        return flowMesh;
      };

      const stock = createStockAt(
        new THREE.Vector3(0, 2.9, 0),
        "GovernmentWealth"
      );
      const upperStock = createStockAt(
        new THREE.Vector3(0, 3.5, 0),
        "GovernmentHealth"
      );

      createFlowBetween(
        earth,
        stock.position,
        "Flow_EarthToStock",
        stockFlowRadius,
        ["GovernmentWealth"],
        true
      );
      createFlowBetween(
        stock,
        upperStock,
        "Flow_StockToStock",
        stockFlowRadius,
        ["GovernmentWealth", "GovernmentHealth"],
        true
      );

      // Six additional Stocks as three vertical pairs around Earth's upper hemisphere.
      const angleOffset = Math.random() * Math.PI * 2;
      const pairCount = 3;
      const pairedStockIds = [
        ["ElitePopulationWealth", "ElitePopulationAmount"],
        ["GeneralPopulationWealth", "GeneralPopulationAmount"],
        ["GeneralPopulationDebt", "GeneralPopulationImmiseration"]
      ];

      for (let i = 0; i < pairCount; i += 1) {
        const angle = angleOffset + (i * Math.PI * 2) / pairCount;
        const radiusFromSphere = 1.5 + Math.random() * 0.3;
        const lowerY = earth.position.y + 1.0 + Math.random() * 0.25; // clearly above equator
        const baseX = Math.cos(angle) * radiusFromSphere;
        const baseZ = Math.sin(angle) * radiusFromSphere;

        const lowerStock = createStockAt(
          new THREE.Vector3(baseX, lowerY, baseZ),
          pairedStockIds[i][0]
        );
        const lateralOffset = 0.35;
        const offsetX = Math.cos(angle + Math.PI / 2) * lateralOffset;
        const offsetZ = Math.sin(angle + Math.PI / 2) * lateralOffset;
        const upperStockInPair = createStockAt(
          new THREE.Vector3(baseX + offsetX, lowerY + 0.65, baseZ + offsetZ),
          pairedStockIds[i][1]
        );

        createFlowBetween(
          earth,
          lowerStock,
          `Flow_EarthToRing_${i + 1}`,
          stockFlowRadius,
          [pairedStockIds[i][0]],
          true
        );
        createFlowBetween(
          lowerStock,
          upperStockInPair,
          `Flow_RingChain_${i + 1}`,
          stockFlowRadius,
          [pairedStockIds[i][0], pairedStockIds[i][1]],
          true
        );
      }

      // Three additional single Stocks with direct Flow to Earth.
      const singleStockIds = ["ElitePopulationInfluence", "GovernmentDebt"];
      const singleStockCount = singleStockIds.length;
      const singleAngleOffset = angleOffset + Math.PI / 3;

      for (let i = 0; i < singleStockCount; i += 1) {
        const angle = singleAngleOffset + (i * Math.PI * 2) / singleStockCount;
        const radiusFromSphere = 1.8 + Math.random() * 0.3;
        const y = earth.position.y + 1.45 + Math.random() * 0.3; // grouped higher above equator
        const singleStock = createStockAt(
          new THREE.Vector3(
            Math.cos(angle) * radiusFromSphere,
            y,
            Math.sin(angle) * radiusFromSphere
          ),
          singleStockIds[i]
        );

        createFlowBetween(
          earth,
          singleStock,
          `Flow_EarthToSingle_${i + 1}`,
          stockFlowRadius,
          [singleStockIds[i]],
          true
        );
      }

      // Five-segment clickable bar in front of Earth.
      const barSegments = [];
      const modeToggleSegments = [];
      const segmentMaterialBase = {
        color: inactiveViewControllerColor,
        metalness: inactiveViewControllerMetalness,
        roughness: inactiveViewControllerRoughness
      };
      const segmentSelectedColor = 0x0ea5e9;
      const activeDynamicBarSegments = new Set();
      const activeCategoryBarSegments = new Set();
      let activeModeToggleSegment = null;
      const barLabelSprites = [];
      const dynamicButtonLabels = [
        "Dynamic 1",
        "Dynamic 2",
        "Dynamic 3",
        "Dynamic 4",
        "Dynamic 5"
      ];
      const modelCategoryLabels = [
        "Political",
        "Geopolitical",
        "Military/Intel",
        "Quantitative",
        "Economic"
      ];
      let primaryBarMode = "Dynamics";

      const createNumberSprite = (labelText) => {
        const canvas = document.createElement("canvas");
        canvas.width = 384;
        canvas.height = 128;
        const ctx = canvas.getContext("2d");
        const drawLabel = (text) => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "bold 46px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        };
        drawLabel(labelText);

        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        const sprite = new THREE.Sprite(
          new THREE.SpriteMaterial({ map: texture, transparent: true })
        );
        sprite.scale.set(0.95, 0.28, 0.28);
        sprite.userData.updateText = (text) => {
          drawLabel(text);
          texture.needsUpdate = true;
        };
        return sprite;
      };

      const segmentCount = 5;
      const segmentWidth = 0.8;
      const segmentDepth = 0.35;
      const segmentHeight = 0.05;
      const segmentGap = 0.06;
      const barZ = 4.3;
      const barY = 0.12;
      const totalBarWidth = segmentCount * segmentWidth + (segmentCount - 1) * segmentGap;
      const startX = -totalBarWidth / 2 + segmentWidth / 2;

      for (let i = 0; i < segmentCount; i += 1) {
        const material = new THREE.MeshStandardMaterial({ ...segmentMaterialBase });
        const segment = new THREE.Mesh(
          new THREE.BoxGeometry(segmentWidth, segmentHeight, segmentDepth),
          material
        );
        segment.position.set(startX + i * (segmentWidth + segmentGap), barY, barZ);
        segment.name = `BarSegment_${i + 1}`;
        segment.userData.segmentIndex = i + 1;
        segment.userData.baseColor = material.color.clone();
        scene.add(segment);

        const numberSprite = createNumberSprite(dynamicButtonLabels[i]);
        numberSprite.position.set(segment.position.x, segment.position.y + 0.09, segment.position.z);
        scene.add(numberSprite);
        barLabelSprites.push(numberSprite);

        barSegments.push(segment);
      }

      // Default state: all dynamic buttons inactive.
      const dynamic1Segment = barSegments[0] || null;
      let isDynamic1Active = false;
      let hasActivatedModelAfterDynamic1 = false;
      const applyPrimaryBarLabels = (labels) => {
        barLabelSprites.forEach((sprite, i) => {
          sprite.userData.updateText(labels[i] || "");
        });
      };
      const applyPrimaryBarSegmentSelectionStyles = () => {
        const activeSet =
          primaryBarMode === "Dynamics" ? activeDynamicBarSegments : activeCategoryBarSegments;
        barSegments.forEach((segment) => {
          if (activeSet.has(segment)) {
            segment.material.color.setHex(segmentSelectedColor);
          } else {
            segment.material.color.copy(segment.userData.baseColor);
          }
        });
      };

      // Smaller two-segment mode toggle near the dynamic bar.
      const modeToggleLabels = ["Dynamics", "Model Categories"];
      const modeSegmentWidth = 1.05;
      const modeSegmentDepth = 0.24;
      const modeSegmentHeight = 0.04;
      const modeSegmentGap = 0.05;
      const modeBarY = barY + 0.01;
      const modeBarZ = barZ + 0.55;
      const modeTotalWidth =
        modeToggleLabels.length * modeSegmentWidth +
        (modeToggleLabels.length - 1) * modeSegmentGap;
      const modeStartX = -modeTotalWidth / 2 + modeSegmentWidth / 2;

      for (let i = 0; i < modeToggleLabels.length; i += 1) {
        const material = new THREE.MeshStandardMaterial({ ...segmentMaterialBase });
        const modeSegment = new THREE.Mesh(
          new THREE.BoxGeometry(modeSegmentWidth, modeSegmentHeight, modeSegmentDepth),
          material
        );
        modeSegment.position.set(
          modeStartX + i * (modeSegmentWidth + modeSegmentGap),
          modeBarY,
          modeBarZ
        );
        modeSegment.name = `ModeToggle_${modeToggleLabels[i].replace(" ", "")}`;
        modeSegment.userData.modeToggle = true;
        modeSegment.userData.modeLabel = modeToggleLabels[i];
        modeSegment.userData.baseColor = material.color.clone();
        scene.add(modeSegment);

        const modeLabelSprite = createNumberSprite(modeToggleLabels[i]);
        modeLabelSprite.scale.set(1.2, 0.28, 0.28);
        modeLabelSprite.position.set(
          modeSegment.position.x,
          modeSegment.position.y + 0.085,
          modeSegment.position.z
        );
        scene.add(modeLabelSprite);

        modeToggleSegments.push(modeSegment);
      }

      // Default mode: Dynamics active.
      activeModeToggleSegment = modeToggleSegments[0] || null;
      if (activeModeToggleSegment) {
        activeModeToggleSegment.material.color.setHex(segmentSelectedColor);
      }

      // Time Scrubber: long thin rectangle with draggable horizontal control.
      const timeScrubberPanel = new THREE.Mesh(
        new THREE.BoxGeometry(4.8, 0.05, 0.28),
        new THREE.MeshStandardMaterial({
          color: inactiveViewControllerColor,
          metalness: inactiveViewControllerMetalness,
          roughness: inactiveViewControllerRoughness
        })
      );
      timeScrubberPanel.position.set(0, 0.13, 3.1);
      timeScrubberPanel.rotation.y = 0;
      timeScrubberPanel.name = "TimeScrubber";
      scene.add(timeScrubberPanel);

      const sliderTrackHalfWidth = 2.0;
      const sliderTrackY = timeScrubberPanel.position.y + 0.04;
      const sliderTrackZ = timeScrubberPanel.position.z;
      const sliderTrackStart = new THREE.Vector3(-sliderTrackHalfWidth, sliderTrackY, sliderTrackZ);
      const sliderTrackEnd = new THREE.Vector3(sliderTrackHalfWidth, sliderTrackY, sliderTrackZ);
      const sliderTrack = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([sliderTrackStart, sliderTrackEnd]),
        new THREE.LineBasicMaterial({ color: 0xe2e8f0 })
      );
      sliderTrack.name = "TimeScrubberTrack";
      scene.add(sliderTrack);

      const scrubberSnapValues = [1 / 3, 2 / 3, 1];
      const scrubberSnapThreshold = 0.06;
      const scrubberSnapXPositions = scrubberSnapValues.map(
        (value) => sliderTrackStart.x + value * (sliderTrackEnd.x - sliderTrackStart.x)
      );
      const scrubberSnapMarkers = [];
      scrubberSnapXPositions.forEach((xPos, index) => {
        const marker = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 12, 10),
          new THREE.MeshStandardMaterial({
            color: 0x94a3b8,
            metalness: 0.1,
            roughness: 0.45
          })
        );
        marker.position.set(xPos, sliderTrackY + 0.005, sliderTrackZ);
        marker.name = `TimeScrubberSnapPoint_${index + 1}`;
        scene.add(marker);
        scrubberSnapMarkers.push(marker);
      });

      const sliderKnob = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 20, 16),
        new THREE.MeshStandardMaterial({
          color: segmentSelectedColor,
          metalness: 0.2,
          roughness: 0.35
        })
      );
      sliderKnob.position.copy(sliderTrackStart);
      sliderKnob.name = "TimeScrubberKnob";
      scene.add(sliderKnob);

      // Cyclical Season Indicator: minimal analog-style dial.
      const cyclicalSeasonIndicatorCenter = new THREE.Vector3(3.15, 0.12, 3.1);
      const seasonDialRadius = 0.275;
      const seasonDial = new THREE.Mesh(
        new THREE.CylinderGeometry(seasonDialRadius, seasonDialRadius, 0.015, 40),
        new THREE.MeshStandardMaterial({
          color: 0x0f172a,
          metalness: 0.1,
          roughness: 0.55
        })
      );
      seasonDial.position.copy(cyclicalSeasonIndicatorCenter);
      seasonDial.name = "CyclicalSeasonIndicator";
      scene.add(seasonDial);

      const seasonQuadrantMaterial = new THREE.LineBasicMaterial({ color: 0xcbd5e1 });
      const quadrantLineVertical = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(
            cyclicalSeasonIndicatorCenter.x,
            cyclicalSeasonIndicatorCenter.y + 0.02,
            cyclicalSeasonIndicatorCenter.z - seasonDialRadius * 0.92
          ),
          new THREE.Vector3(
            cyclicalSeasonIndicatorCenter.x,
            cyclicalSeasonIndicatorCenter.y + 0.02,
            cyclicalSeasonIndicatorCenter.z + seasonDialRadius * 0.92
          )
        ]),
        seasonQuadrantMaterial
      );
      scene.add(quadrantLineVertical);

      const quadrantLineHorizontal = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(
            cyclicalSeasonIndicatorCenter.x - seasonDialRadius * 0.92,
            cyclicalSeasonIndicatorCenter.y + 0.02,
            cyclicalSeasonIndicatorCenter.z
          ),
          new THREE.Vector3(
            cyclicalSeasonIndicatorCenter.x + seasonDialRadius * 0.92,
            cyclicalSeasonIndicatorCenter.y + 0.02,
            cyclicalSeasonIndicatorCenter.z
          )
        ]),
        seasonQuadrantMaterial
      );
      scene.add(quadrantLineHorizontal);

      const seasonHandPivot = new THREE.Object3D();
      seasonHandPivot.position.set(
        cyclicalSeasonIndicatorCenter.x,
        cyclicalSeasonIndicatorCenter.y + 0.03,
        cyclicalSeasonIndicatorCenter.z
      );
      scene.add(seasonHandPivot);

      const seasonHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.015, 0.005, seasonDialRadius * 0.72),
        new THREE.MeshStandardMaterial({
          color: 0xe2e8f0,
          metalness: 0.15,
          roughness: 0.4
        })
      );
      seasonHand.position.set(0, 0, seasonDialRadius * 0.36);
      seasonHandPivot.add(seasonHand);

      const seasonHandHub = new THREE.Mesh(
        new THREE.SphereGeometry(0.015, 14, 10),
        new THREE.MeshStandardMaterial({
          color: segmentSelectedColor,
          metalness: 0.2,
          roughness: 0.3
        })
      );
      seasonHandHub.position.set(0, 0.001, 0);
      seasonHandPivot.add(seasonHandHub);

      let isDraggingSlider = false;
      let suppressNextClick = false;
      let sliderValue = 0;
      let previousSliderValue = 0;
      let activeSnapPointIndex = null;
      // 60 turns over full slider range -> ~20 turns between each 1/3 snap interval.
      const scrubRotationTurnsPerUnit = 60;
      const scrubRotationRadiansPerUnit = scrubRotationTurnsPerUnit * Math.PI * 2;
      let seasonHandAccumulatedRotation = Math.PI / 6;
      seasonHandPivot.rotation.y = seasonHandAccumulatedRotation;

      // Fixed Model->Stock links used for deterministic hide/show behavior.
      // Only Stocks directly connected to Earth are included here.
      const modelLinkedStockNames = {
        1: ["GovernmentWealth", "GovernmentHealth"],
        2: ["ElitePopulationWealth", "ElitePopulationAmount"],
        3: [
          "GeneralPopulationWealth",
          "GeneralPopulationAmount",
          "GeneralPopulationDebt",
          "GeneralPopulationImmiseration"
        ],
        4: ["ElitePopulationInfluence"],
        5: ["GovernmentDebt"]
      };
      const snapPointModelHighlights = {
        1: [1, 3],
        2: [2, 4, 5],
        3: [1, 2, 3, 4, 5]
      };
      const snapHighlightColor = new THREE.Color(0xef4444);
      // Child Stocks hide when their parent Stock is hidden.
      // Transparent glass-like spheres for Models and Secondary Models.
      const holoSphereMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.8,
        transmission: 0.35,
        metalness: 0.0,
        roughness: 0.05,
        ior: 1.45,
        thickness: 0.45
      });
      const captureMaterialState = (material) => ({
        color: material.color ? material.color.clone() : null,
        emissive: material.emissive ? material.emissive.clone() : null,
        emissiveIntensity:
          typeof material.emissiveIntensity === "number"
            ? material.emissiveIntensity
            : null,
        opacity: typeof material.opacity === "number" ? material.opacity : null,
        transparent: typeof material.transparent === "boolean" ? material.transparent : null
      });

      const setDisabledLook = (object3D) => {
        if (!object3D?.material) {
          return;
        }
        const material = object3D.material;
        if (!object3D.userData.baseMaterialState) {
          object3D.userData.baseMaterialState = captureMaterialState(material);
        }
        const base = object3D.userData.baseMaterialState;

        if (object3D.userData.isModelNode) {
          if (material.color) {
            material.color.setHex(0x808080);
          }
          if (material.emissive) {
            material.emissive.set(0x000000);
          }
          if (typeof material.emissiveIntensity === "number") {
            material.emissiveIntensity = 0;
          }
          if (typeof material.opacity === "number") {
            material.opacity = 0.7;
            material.transparent = true;
          }
          if (typeof material.transmission === "number") {
            material.transmission = 0.35;
          }
          if (typeof material.roughness === "number") {
            material.roughness = 0.05;
          }
          if (typeof material.metalness === "number") {
            material.metalness = 0.0;
          }
          if (typeof material.ior === "number") {
            material.ior = 1.45;
          }
          return;
        }

        if (material.color) {
          material.color.set(0x808080);
        }
        if (material.emissive) {
          material.emissive.set(0x000000);
        }
        if (typeof material.emissiveIntensity === "number") {
          material.emissiveIntensity = 0;
        }
        if (typeof material.opacity === "number") {
          material.opacity = Math.min(base.opacity ?? 1, 0.12);
          material.transparent = true;
        }
      };

      const setActiveLook = (object3D) => {
        if (!object3D?.material || !object3D.userData.baseMaterialState) {
          return;
        }
        const material = object3D.material;
        const base = object3D.userData.baseMaterialState;

        if (object3D.userData.isModelNode) {
          if (material.color) {
            material.color.setHex(segmentSelectedColor);
          }
          if (material.emissive) {
            material.emissive.set(0x000000);
          }
          if (typeof material.emissiveIntensity === "number") {
            material.emissiveIntensity = 0;
          }
          if (typeof material.opacity === "number") {
            material.opacity = 0.92;
            material.transparent = true;
          }
          return;
        }

        if (material.color && base.color) {
          material.color.copy(base.color);
        }
        if (material.emissive && base.emissive) {
          material.emissive.copy(base.emissive);
        }
        if (
          typeof material.emissiveIntensity === "number" &&
          typeof base.emissiveIntensity === "number"
        ) {
          material.emissiveIntensity = base.emissiveIntensity;
        }
        if (typeof material.opacity === "number" && typeof base.opacity === "number") {
          material.opacity = base.opacity;
        }
        if (typeof material.transparent === "boolean" && base.transparent !== null) {
          material.transparent = base.transparent;
        }
      };

      const createHoloSphereGroup = (position, groupIndex) => {
        const holoSphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.42, 32, 24),
          holoSphereMaterial.clone()
        );
        holoSphere.position.copy(position);
        holoSphere.name = `HoloSphere_${groupIndex}`;
        holoSphere.userData.isModelNode = true;
        holoSphere.userData.baseMaterialState = captureMaterialState(holoSphere.material);
        scene.add(holoSphere);

        return {
          index: groupIndex,
          position: position.clone(),
          sphere: holoSphere,
          stocks: [],
          secondaryModels: [],
          secondaryFlows: [],
          isActive: true
        };
      };

      const model1Pos = new THREE.Vector3(-3.2, 5.0, -1.2);
      const model2Pos = new THREE.Vector3(-1.6, 5.4, -2.0);
      const model3Pos = new THREE.Vector3(0.0, 5.8, -1.4);
      const model4Pos = new THREE.Vector3(1.6, 5.35, -2.1);
      const model5Pos = new THREE.Vector3(3.2, 5.7, -1.3);

      const modelGroups = [
        createHoloSphereGroup(model1Pos, 1),
        createHoloSphereGroup(model2Pos, 2),
        createHoloSphereGroup(model3Pos, 3),
        createHoloSphereGroup(model4Pos, 4),
        createHoloSphereGroup(model5Pos, 5)
      ];

      // Smaller "Secondary Models" connected to specific Models with Flows.
      const createSecondaryModel = (position, modelGroup, index) => {
        const secondarySphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.26, 28, 20),
          holoSphereMaterial.clone()
        );
        secondarySphere.position.copy(position);
        secondarySphere.name = `SecondaryModel_${index}`;
        secondarySphere.userData.isModelNode = true;
        secondarySphere.userData.baseMaterialState = captureMaterialState(
          secondarySphere.material
        );
        scene.add(secondarySphere);

        const secondaryFlow = createFlowBetween(
          modelGroup.position,
          position,
          `Flow_ModelToSecondary_${index}`,
          flowRadius * 0.5
        );

        if (secondaryFlow) {
          secondaryFlow.userData.baseMaterialState = captureMaterialState(
            secondaryFlow.material
          );
        }

        modelGroup.secondaryModels.push(secondarySphere);
        if (secondaryFlow) {
          modelGroup.secondaryFlows.push(secondaryFlow);
        }
      };

      createSecondaryModel(
        model1Pos.clone().add(new THREE.Vector3(-0.9, 0.55, -0.35)),
        modelGroups[0],
        1
      );
      createSecondaryModel(
        model1Pos.clone().add(new THREE.Vector3(-0.25, 0.95, 0.75)),
        modelGroups[0],
        2
      );
      createSecondaryModel(
        model4Pos.clone().add(new THREE.Vector3(0.85, 0.7, 0.25)),
        modelGroups[3],
        3
      );

      // Dome field of tiny spheres above Models.
      const domeSphereCount = 38;
      const domeSphereRadius = 0.07;
      const domeHalfWidth = 9.6;
      const domeHalfDepth = 4.4;
      const domeCenter = new THREE.Vector3(0, 9.8, -1.55);
      const domeEdgeDrop = 1.35;
      const domeMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xf8fafc,
        transparent: true,
        opacity: 0.85,
        transmission: 0.25,
        roughness: 0.08,
        metalness: 0.0,
        ior: 1.45,
        thickness: 0.06
      });
      const placedDomePositions = [];

      for (let i = 0; i < domeSphereCount; i += 1) {
        let placedPosition = null;
        for (let attempt = 0; attempt < 240; attempt += 1) {
          const x = (Math.random() * 2 - 1) * domeHalfWidth;
          const z = (Math.random() * 2 - 1) * domeHalfDepth + domeCenter.z;

          // Prefer points near center while keeping randomness and uneven spacing.
          const normalizedRadius = Math.sqrt(
            (x * x) / (domeHalfWidth * domeHalfWidth) +
              ((z - domeCenter.z) * (z - domeCenter.z)) / (domeHalfDepth * domeHalfDepth)
          );
          if (normalizedRadius > 1.05) {
            continue;
          }
          if (Math.random() < normalizedRadius * 0.28) {
            continue;
          }

          const y =
            domeCenter.y -
            Math.min(1, normalizedRadius * normalizedRadius) * domeEdgeDrop +
            (Math.random() * 2 - 1) * 0.06;
          const candidate = new THREE.Vector3(x, y, z);

          const minDistance = domeSphereRadius * 2.3;
          const overlaps = placedDomePositions.some(
            (existing) => existing.distanceTo(candidate) < minDistance
          );
          if (!overlaps) {
            placedPosition = candidate;
            break;
          }
        }

        if (!placedPosition) {
          // Rare fallback to ensure count is reached while still non-overlapping.
          const angle = (i / domeSphereCount) * Math.PI * 2;
          const ring = 0.35 + 0.55 * (i / domeSphereCount);
          const x = Math.cos(angle) * domeHalfWidth * ring;
          const z = domeCenter.z + Math.sin(angle) * domeHalfDepth * ring;
          const normalizedRadius = ring;
          const y = domeCenter.y - normalizedRadius * normalizedRadius * domeEdgeDrop;
          placedPosition = new THREE.Vector3(x, y, z);
        }

        placedDomePositions.push(placedPosition);
        const domeSphere = new THREE.Mesh(
          new THREE.SphereGeometry(domeSphereRadius, 18, 14),
          domeMaterial.clone()
        );
        domeSphere.position.copy(placedPosition);
        domeSphere.name = `DomeNode_${i + 1}`;
        scene.add(domeSphere);
      }

      // Dynamic 1 transition: Models and Secondary Models join/release Sky Dome.
      const modelBaseRadius = 0.42;
      const secondaryBaseRadius = 0.26;
      const skyNodeRadius = domeSphereRadius;
      const modelSkyScale = skyNodeRadius / modelBaseRadius;
      const secondarySkyScale = skyNodeRadius / secondaryBaseRadius;
      const movingModelNodes = [];
      let dynamic1FlowRevealPending = false;
      let dynamic1FlowFadeProgress = 1;
      const skyJoinOffsets = [
        new THREE.Vector3(0.18, 0.0, 0.0),
        new THREE.Vector3(-0.18, 0.04, 0.04),
        new THREE.Vector3(0.0, -0.04, 0.2),
        new THREE.Vector3(0.16, 0.02, -0.16),
        new THREE.Vector3(-0.14, -0.03, -0.16),
        new THREE.Vector3(0.0, 0.05, -0.2),
        new THREE.Vector3(0.2, -0.05, 0.08),
        new THREE.Vector3(-0.2, 0.02, 0.12)
      ];
      const modelSkyTargets = [];

      for (let i = 0; i < 8; i += 1) {
        const starAnchor = placedDomePositions[(i * 3) % placedDomePositions.length]
          .clone()
          .add(skyJoinOffsets[i]);
        modelSkyTargets.push(starAnchor);
      }

      const registerMovingModelNode = (mesh, skyTarget, skyScale) => {
        movingModelNodes.push({
          mesh,
          basePosition: mesh.position.clone(),
          targetPosition: mesh.position.clone(),
          skyPosition: skyTarget.clone(),
          targetScale: 1,
          skyScale
        });
      };

      modelGroups.forEach((group, index) => {
        registerMovingModelNode(group.sphere, modelSkyTargets[index], modelSkyScale);
      });

      let nextSkyTargetIndex = modelGroups.length;
      modelGroups.forEach((group) => {
        group.secondaryModels.forEach((secondaryModelMesh) => {
          const skyTarget = modelSkyTargets[nextSkyTargetIndex % modelSkyTargets.length];
          registerMovingModelNode(secondaryModelMesh, skyTarget, secondarySkyScale);
          nextSkyTargetIndex += 1;
        });
      });

      const applyDynamic1State = () => {
        movingModelNodes.forEach((node) => {
          if (isDynamic1Active) {
            node.targetPosition.copy(node.basePosition);
            node.targetScale = 1;
          } else {
            node.targetPosition.copy(node.skyPosition);
            node.targetScale = node.skyScale;
          }
        });

        modelGroups.forEach((group) => {
          group.secondaryFlows.forEach((flow) => {
            flow.userData.hiddenByDynamic1 = !isDynamic1Active;
            if (isDynamic1Active) {
              flow.userData.dynamic1TargetOpacity =
                flow.userData.baseMaterialState?.opacity ?? flow.material.opacity ?? 1;
              flow.material.opacity = 0;
              flow.visible = false;
            } else {
              flow.material.opacity = 0;
              flow.visible = false;
            }
          });
        });

        if (isDynamic1Active) {
          dynamic1FlowRevealPending = true;
          dynamic1FlowFadeProgress = 0;
        } else {
          dynamic1FlowRevealPending = false;
          dynamic1FlowFadeProgress = 0;
        }
      };

      applyDynamic1State();

      const setModelGroupState = (modelGroup, isActive) => {
        modelGroup.isActive = isActive;
        const relatedObjects = [
          modelGroup.sphere,
          ...modelGroup.stocks,
          ...modelGroup.secondaryModels,
          ...modelGroup.secondaryFlows
        ];
        relatedObjects.forEach((object3D) => {
          if (isActive) {
            setActiveLook(object3D);
          } else {
            setDisabledLook(object3D);
          }
        });
      };

      const applySnapDrivenHighlights = (snapPointIndex) => {
        // Restore current active/inactive model styles first.
        modelGroups.forEach((group) => {
          setModelGroupState(group, group.isActive);
        });
        // Restore stock base colors first.
        stockRegistry.forEach((stockEntry) => {
          stockEntry.mesh.material.color.copy(stockEntry.baseMeshColor);
          stockEntry.edges.material.color.copy(stockEntry.baseEdgeColor);
        });

        if (!snapPointIndex) {
          return;
        }

        const highlightedModelIndexes = snapPointModelHighlights[snapPointIndex] || [];
        const highlightedStockNames = new Set();
        highlightedModelIndexes.forEach((modelIndex) => {
          const modelGroup = modelGroups[modelIndex - 1];
          if (modelGroup?.isActive && modelGroup?.sphere?.material?.color) {
            modelGroup.sphere.material.color.copy(snapHighlightColor);
          }
          (modelLinkedStockNames[modelIndex] || []).forEach((stockName) => {
            highlightedStockNames.add(stockName);
          });
        });

        highlightedStockNames.forEach((stockName) => {
          const stockEntry = stockRegistry.get(stockName);
          if (!stockEntry) {
            return;
          }
          stockEntry.mesh.material.color.copy(snapHighlightColor);
          stockEntry.edges.material.color.copy(snapHighlightColor);
        });
      };

      const setAllModelsInactive = () => {
        modelGroups.forEach((group) => {
          setModelGroupState(group, false);
        });
        applyLinkedStockVisibility();
      };

      const applyLinkedStockVisibility = () => {
        if (!isDynamic1Active || !hasActivatedModelAfterDynamic1) {
          stockRegistry.forEach((stockEntry) => {
            stockEntry.mesh.visible = false;
            stockEntry.edges.visible = false;
          });
          stockConnectedFlows.forEach((flow) => {
            flow.userData.layoutVisible = false;
            flow.visible = false;
          });
          return;
        }

        const hiddenDirectlyByModels = new Set();
        modelGroups.forEach((group) => {
          if (!group.isActive) {
            const linkedStockNames = modelLinkedStockNames[group.index] || [];
            linkedStockNames.forEach((name) => hiddenDirectlyByModels.add(name));
          }
        });

        const isStockHidden = (stockName, visiting = new Set()) => {
          if (hiddenDirectlyByModels.has(stockName)) {
            return true;
          }
          const parentName = stockParentMap[stockName];
          if (!parentName) {
            return false;
          }
          if (visiting.has(stockName)) {
            return false;
          }
          visiting.add(stockName);
          const parentHidden = isStockHidden(parentName, visiting);
          visiting.delete(stockName);
          return parentHidden;
        };

        const visibleRootNames = [];
        stockRegistry.forEach((stockEntry, stockName) => {
          const shouldBeVisible = !isStockHidden(stockName);
          stockEntry.mesh.visible = shouldBeVisible;
          stockEntry.edges.visible = shouldBeVisible;
          if (shouldBeVisible && !stockParentMap[stockName]) {
            visibleRootNames.push(stockName);
          }
        });

        visibleRootNames.sort((a, b) => stockRootNames.indexOf(a) - stockRootNames.indexOf(b));
        const rootAngleMap = new Map();
        const rootCount = visibleRootNames.length;
        const rootRadius = 2.0;
        const rootY = earth.position.y + 1.5;

        visibleRootNames.forEach((name, index) => {
          const angle = -Math.PI / 2 + (index * Math.PI * 2) / rootCount;
          rootAngleMap.set(name, angle);
          const stockEntry = stockRegistry.get(name);
          if (!stockEntry) {
            return;
          }
          stockEntry.targetPosition.set(
            Math.cos(angle) * rootRadius,
            rootY,
            Math.sin(angle) * rootRadius
          );
        });

        Object.entries(stockParentMap).forEach(([childName, parentName]) => {
          const childEntry = stockRegistry.get(childName);
          const parentEntry = stockRegistry.get(parentName);
          if (!childEntry || !parentEntry || !childEntry.mesh.visible || !parentEntry.mesh.visible) {
            return;
          }
          const parentAngle = rootAngleMap.get(parentName) ?? 0;
          const lateralOffset = 0.35;
          const verticalOffset = 0.65;
          childEntry.targetPosition
            .copy(parentEntry.targetPosition)
            .add(
              new THREE.Vector3(
                Math.cos(parentAngle + Math.PI / 2) * lateralOffset,
                verticalOffset,
                Math.sin(parentAngle + Math.PI / 2) * lateralOffset
              )
            );
        });

        stockConnectedFlows.forEach((flow) => {
          const connectedNames = flow.userData.connectedStockNames || [];
          flow.userData.layoutVisible = connectedNames.every((name) => {
            const entry = stockRegistry.get(name);
            return entry ? entry.mesh.visible : true;
          });
          flow.visible = flow.userData.layoutVisible;
        });
      };

      const modelObjectMap = new Map();
      modelGroups.forEach((modelGroup) => {
        modelObjectMap.set(modelGroup.sphere, modelGroup);
      });
      const stockMeshMap = new Map();
      stockRegistry.forEach((entry) => {
        stockMeshMap.set(entry.mesh, entry);
      });

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const hoverRaycaster = new THREE.Raycaster();
      const hoverPointer = new THREE.Vector2();
      const sliderDragRaycaster = new THREE.Raycaster();
      const sliderSegmentPoint = new THREE.Vector3();

      const updateSliderFromPointerEvent = (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        sliderDragRaycaster.setFromCamera(pointer, camera);
        sliderDragRaycaster.ray.distanceSqToSegment(
          sliderTrackStart,
          sliderTrackEnd,
          undefined,
          sliderSegmentPoint
        );
        const rawSliderValue = THREE.MathUtils.clamp(
          (sliderSegmentPoint.x - sliderTrackStart.x) /
            (sliderTrackEnd.x - sliderTrackStart.x),
          0,
          1
        );
        let closestSnapValue = scrubberSnapValues[0];
        let smallestDistance = Math.abs(rawSliderValue - closestSnapValue);
        for (let i = 1; i < scrubberSnapValues.length; i += 1) {
          const candidate = scrubberSnapValues[i];
          const distance = Math.abs(rawSliderValue - candidate);
          if (distance < smallestDistance) {
            smallestDistance = distance;
            closestSnapValue = candidate;
          }
        }

        const isWithinSnapRange = smallestDistance <= scrubberSnapThreshold;
        activeSnapPointIndex = isWithinSnapRange
          ? scrubberSnapValues.indexOf(closestSnapValue) + 1
          : null;
        sliderValue = isWithinSnapRange ? closestSnapValue : rawSliderValue;
        stageBorder.material.color.copy(
          isWithinSnapRange ? stageBorderSnapColor : stageBorderBaseColor
        );
        applySnapDrivenHighlights(activeSnapPointIndex);
        sliderKnob.position.set(
          sliderTrackStart.x + sliderValue * (sliderTrackEnd.x - sliderTrackStart.x),
          sliderTrackY,
          sliderTrackZ
        );
        const sliderDelta = sliderValue - previousSliderValue;
        earth.rotation.y += sliderDelta * scrubRotationRadiansPerUnit;
        seasonHandAccumulatedRotation -= sliderDelta * scrubRotationRadiansPerUnit;
        seasonHandPivot.rotation.y = seasonHandAccumulatedRotation;
        previousSliderValue = sliderValue;
      };

      const modelHoverLabelMap = new Map();
      modelGroups.forEach((group) => {
        modelHoverLabelMap.set(group.sphere, `Model ${group.index}`);
      });

      const stockHoverObjects = Array.from(stockRegistry.values()).map((entry) => entry.mesh);
      const hoverTargets = [...modelGroups.map((group) => group.sphere), ...stockHoverObjects];

      const showTooltip = (text, x, y) => {
        tooltip.textContent = text;
        tooltip.style.display = "block";
        tooltip.style.left = `${x + 12}px`;
        tooltip.style.top = `${y + 12}px`;
      };

      const hideTooltip = () => {
        tooltip.style.display = "none";
      };

      renderer.domElement.addEventListener("mousedown", (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObject(sliderKnob, false);
        if (hits.length > 0) {
          isDraggingSlider = true;
          suppressNextClick = false;
          previousSliderValue = sliderValue;
          controls.enableRotate = false;
          renderer.domElement.style.cursor = "grabbing";
        }
      });

      window.addEventListener("mouseup", () => {
        if (isDraggingSlider) {
          isDraggingSlider = false;
          suppressNextClick = true;
        }
        controls.enableRotate = true;
        renderer.domElement.style.cursor = "";
      });

      renderer.domElement.addEventListener("mousemove", (event) => {
        if (isDraggingSlider) {
          updateSliderFromPointerEvent(event);
          hideTooltip();
          return;
        }

        const rect = renderer.domElement.getBoundingClientRect();
        hoverPointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        hoverPointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        hoverRaycaster.setFromCamera(hoverPointer, camera);
        const intersections = hoverRaycaster.intersectObjects(
          hoverTargets.filter((obj) => obj.visible),
          false
        );

        if (intersections.length === 0) {
          hideTooltip();
          return;
        }

        const hoveredObject = intersections[0].object;
        const modelLabel = modelHoverLabelMap.get(hoveredObject);
        const stockLabel = hoveredObject.name;
        showTooltip(modelLabel || stockLabel, event.clientX, event.clientY);
      });

      renderer.domElement.addEventListener("mouseleave", () => {
        hideTooltip();
      });

      renderer.domElement.addEventListener("click", (event) => {
        if (suppressNextClick) {
          suppressNextClick = false;
          return;
        }

        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(pointer, camera);
        const intersections = raycaster.intersectObjects(
          [
            ...modelGroups.map((group) => group.sphere),
            ...Array.from(stockMeshMap.keys()).filter((mesh) => mesh.visible),
            ...barSegments,
            ...modeToggleSegments
          ],
          false
        );

        if (intersections.length === 0) {
          return;
        }

        const hitObject = intersections[0].object;
        if (hitObject.userData.modeToggle) {
          if (activeModeToggleSegment && activeModeToggleSegment !== hitObject) {
            activeModeToggleSegment.material.color.copy(
              activeModeToggleSegment.userData.baseColor
            );
          }
          hitObject.material.color.setHex(segmentSelectedColor);
          activeModeToggleSegment = hitObject;
          const nextMode = hitObject.userData.modeLabel;
          if (nextMode !== primaryBarMode) {
            primaryBarMode = nextMode;
            applyPrimaryBarLabels(
              primaryBarMode === "Dynamics" ? dynamicButtonLabels : modelCategoryLabels
            );
            applyPrimaryBarSegmentSelectionStyles();
          }
          return;
        }

        if (hitObject.userData.segmentIndex) {
          const activeSet =
            primaryBarMode === "Dynamics" ? activeDynamicBarSegments : activeCategoryBarSegments;
          if (activeSet.has(hitObject)) {
            activeSet.delete(hitObject);
            hitObject.material.color.copy(hitObject.userData.baseColor);
          } else {
            activeSet.add(hitObject);
            hitObject.material.color.setHex(segmentSelectedColor);
          }

          if (primaryBarMode === "Dynamics" && hitObject === dynamic1Segment) {
            isDynamic1Active = activeDynamicBarSegments.has(dynamic1Segment);
            hasActivatedModelAfterDynamic1 = false;
            setAllModelsInactive();
            applyDynamic1State();
            applySnapDrivenHighlights(activeSnapPointIndex);
          }
          return;
        }

        const stockEntry = stockMeshMap.get(hitObject);
        if (stockEntry) {
          stockEntry.isRotated = !stockEntry.isRotated;
          stockEntry.targetRotationZ = stockEntry.isRotated ? Math.PI : 0;
          return;
        }

        const modelGroup = modelObjectMap.get(hitObject);
        if (!modelGroup) {
          return;
        }

        const nextIsActive = !modelGroup.isActive;
        setModelGroupState(modelGroup, nextIsActive);
        if (isDynamic1Active && nextIsActive) {
          hasActivatedModelAfterDynamic1 = true;
        }
        applyLinkedStockVisibility();
        applySnapDrivenHighlights(activeSnapPointIndex);
      });

      applyLinkedStockVisibility();
      applySnapDrivenHighlights(activeSnapPointIndex);

      const animate = () => {
        movingModelNodes.forEach((node) => {
          node.mesh.position.lerp(node.targetPosition, 0.08);
          const currentScale = node.mesh.scale.x + (node.targetScale - node.mesh.scale.x) * 0.08;
          node.mesh.scale.setScalar(currentScale);
        });

        if (isDynamic1Active) {
          const nodesSettled = movingModelNodes.every((node) => {
            const positionSettled = node.mesh.position.distanceTo(node.targetPosition) < 0.03;
            const scaleSettled = Math.abs(node.mesh.scale.x - node.targetScale) < 0.03;
            return positionSettled && scaleSettled;
          });

          if (dynamic1FlowRevealPending && nodesSettled) {
            dynamic1FlowRevealPending = false;
          }

          if (!dynamic1FlowRevealPending) {
            dynamic1FlowFadeProgress = Math.min(1, dynamic1FlowFadeProgress + 0.08);
            modelGroups.forEach((group) => {
              group.secondaryFlows.forEach((flow) => {
                if (flow.userData.hiddenByDynamic1) {
                  flow.visible = false;
                  return;
                }
                const targetOpacity =
                  flow.userData.dynamic1TargetOpacity ??
                  flow.userData.baseMaterialState?.opacity ??
                  1;
                flow.material.opacity = targetOpacity * dynamic1FlowFadeProgress;
                flow.visible = true;
              });
            });
          }
        }

        stockRegistry.forEach((stockEntry) => {
          if (!stockEntry.mesh.visible) {
            return;
          }
          stockEntry.mesh.position.lerp(stockEntry.targetPosition, 0.1);
          stockEntry.mesh.rotation.z +=
            (stockEntry.targetRotationZ - stockEntry.mesh.rotation.z) * 0.12;
          stockEntry.edges.position.copy(stockEntry.mesh.position);
          stockEntry.edges.rotation.copy(stockEntry.mesh.rotation);
        });

        animatedStockFlows.forEach(({ flowMesh, start, end }) => {
          const startPos = start instanceof THREE.Object3D ? start.position : start;
          const endPos = end instanceof THREE.Object3D ? end.position : end;
          const hasLength = updateFlowTransform(flowMesh, startPos, endPos);
          flowMesh.visible = (flowMesh.userData.layoutVisible ?? true) && hasLength;
        });

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      };
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      });
    </script>
  </body>
</html>
